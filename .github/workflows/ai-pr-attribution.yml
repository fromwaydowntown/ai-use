name: AI PR Attribution

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review, closed]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  attribution:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch attribution refs
        run: |
          git fetch origin '+refs/ai-attribution/*:refs/ai-attribution/*' || true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install attribution CLI
        run: pip install .

      - name: Collect events from all developers
        run: |
          ai-pr-attribution fetch-telemetry \
            --repo . \
            --output .ai-pr-attribution/fetched-events.ndjson \
            --github-native || true

      - name: Download PR diff
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr diff ${{ github.event.pull_request.number }} > pr.diff

      - name: Post attribution comment
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MERGED: ${{ github.event.pull_request.merged }}
        run: |
          ai-pr-attribution analyze-pr \
            --repo . \
            --diff-file pr.diff \
            --commit-sha "${{ github.event.pull_request.head.sha }}" \
            --events-file .ai-pr-attribution/fetched-events.ndjson \
            --post-comment \
            ${{ github.event.pull_request.merged && '--final' || '' }}
